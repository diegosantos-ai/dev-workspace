---
- name: Setup Local Workstation
  hosts: localhost
  connection: local
  become: yes
  become_method: sudo

  vars:
    # Defina aqui os pacotes base para seu ambiente de engenharia
    system_packages:
      - curl
      - git
      - stow
      - tmux
      - zsh
      - unzip
      - jq
      - wget
      - htop
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release

    user: "{{ lookup('env', 'USER') }}"

  tasks:
    - name: Atualizar apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Instalar pacotes de sistema essenciais (Debian/Ubuntu)
      apt:
        name: "{{ system_packages }}"
        state: present
      when: ansible_os_family == "Debian"

    # Preparacao para GNU Stow
    - name: Garantir que diretorio base Code User existe na home
      become_user: "{{ user }}"
      file:
        path: "/home/{{ user }}/.config/Code/User"
        state: directory
        mode: '0755'

    - name: Executar GNU Stow para dotfiles (vscode)
      become_user: "{{ user }}"
      shell: "stow -v -d {{ playbook_dir }}/../dotfiles -t /home/{{ user }} vscode"
      register: stow_output
      changed_when: "'LINK' in stow_output.stderr"

    - name: Restaurar backup de configurações
      become_user: "{{ user }}"
      unarchive:
        src: "{{ playbook_dir }}/../backup-setup.tar.gz"
        dest: "/home/{{ user }}"
        remote_src: yes
        creates: "/home/{{ user }}/.config/Code/User/settings.json"

    # Custom additions for DevOps Checklist
    - name: Garantir que Zsh seja o shell padrão
      user:
        name: "{{ user }}"
        shell: /bin/zsh

    - name: Instalar Oh My Zsh
      become_user: "{{ user }}"
      git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "/home/{{ user }}/.oh-my-zsh"
        depth: 1
      ignore_errors: yes

    - name: Instalar Zsh autosuggestions
      become_user: "{{ user }}"
      git:
        repo: https://github.com/zsh-users/zsh-autosuggestions
        dest: "/home/{{ user }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
      ignore_errors: yes

    - name: Instalar Zsh syntax highlighting
      become_user: "{{ user }}"
      git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
        dest: "/home/{{ user }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
      ignore_errors: yes

    - name: Instalar ASDF
      become_user: "{{ user }}"
      git:
        repo: https://github.com/asdf-vm/asdf.git
        dest: "/home/{{ user }}/.asdf"
        version: v0.14.0
      ignore_errors: yes

    - name: Instalar pacotes via Snap (Docker, Termius, DBeaver, VS Code, kubectl)
      community.general.snap:
        name:
          - docker
          - termius-app
          - dbeaver-ce
          - code
          - kubectl
        classic: "{{ item in ['code', 'kubectl'] }}"
      loop:
        - docker
        - termius-app
        - dbeaver-ce
        - code
        - kubectl
      ignore_errors: yes # Snap isn't always installed

    - name: Instalar extensoes do VS Code
      become_user: "{{ user }}"
      command: "code --install-extension {{ item }} --force"
      loop:
        - GitHub.copilot
        - HashiCorp.terraform
        - ms-azuretools.vscode-docker
        - ms-python.python
        - ms-kubernetes-tools.vscode-kubernetes-tools
      ignore_errors: yes

