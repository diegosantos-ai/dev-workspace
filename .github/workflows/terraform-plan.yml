name: CI - Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'templates/terraform-aws-base/**'
      - 'ovh-terraform/**'

jobs:
  terraform-plan-aws:
    name: TF Plan - AWS Base (Dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/terraform-aws-base/envs/dev

    # Nota: Em um cenario real de producao, voce configuraria
    # as credenciais da AWS via OIDC (OpenID Connect) em secrets.
    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      # Para fins de template e validacao sem credentials ativas, usamos mock/init offline
      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      # Mock das variaveis obrigatorias para que o plan nao quebre
      - name: Create mock tfvars
        run: |
          cat <<EOF > terraform.tfvars
          project_name = "ci-test"
          environment  = "dev"
          owner        = "ci-bot"
          vpc_cidr     = "10.0.0.0/16"
          public_subnet_cidr = "10.0.1.0/24"
          public_subnet_az   = "us-east-1a"
          EOF

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
        continue-on-error: true # Permite capturar o erro para postar no PR

  terraform-plan-ovh:
    name: TF Plan - OVH Cloud (Dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ovh-terraform/envs/dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate
