version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

volumes:
  n8n_data:
  postgres_data:
  qdrant_data:
  langfuse_db_data:

services:
  # ========================================================
  # ENGINE E ORQUESTRAÇÃO
  # ========================================================
  postgres:
    image: postgres:16
    container_name: agents_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U n8n -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: agents_n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:${N8N_PORT:-5678}/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # ========================================================
  # MEMÓRIA (VETORES)
  # ========================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agents_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    logging: *default-logging

  # ========================================================
  # OBSERVABILIDADE (LANGFUSE)
  # ========================================================
  langfuse-db:
    image: postgres:16
    container_name: agents_langfuse_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  langfuse:
    image: langfuse/langfuse:2
    container_name: agents_langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=secret
      - SALT=secret
      - NEXTAUTH_URL=http://localhost:${LANGFUSE_PORT:-3000}
      - TELEMETRY_ENABLED=false
    logging: *default-logging
